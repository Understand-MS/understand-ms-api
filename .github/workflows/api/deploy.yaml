name: deploy-api

on:
  workflow_run:
    workflows: ["build-api"]
    types:
      - completed

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Dev
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }}

          az containerapp update \
            --name ms-chat-api-dev \
            --resource-group ms-chat-dev-rg \
            --image $IMAGE

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Prod
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }}

          az containerapp update \
            --name ms-chat-api-prod \
            --resource-group ms-chat-prod-rg \
            --image $IMAGE
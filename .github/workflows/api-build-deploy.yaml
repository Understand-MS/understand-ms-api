name: build-api

on:
  push:
    paths:
      - "api/**"

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run tests
        run: |
          pip install -r api/requirements.txt
          pytest

      - name: Generate image tag
        id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE api/

      - name: Push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.tag }}
          docker push $IMAGE

  deploy-dev:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: dev
    needs: build

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Dev
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }}

          az containerapp update \
            --name ms-chat-api-dev \
            --resource-group ms-chat-dev-rg \
            --image $IMAGE

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Prod
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api:${{ github.event.workflow_run.head_sha }}

          az containerapp update \
            --name ms-chat-api-prod \
            --resource-group ms-chat-prod-rg \
            --image $IMAGE